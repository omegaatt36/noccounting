name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install templ and tsgo
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go install github.com/microsoft/typescript-go/cmd/tsgo@latest
      - name: Install Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
      - name: Generate code, TypeScript, and CSS
        run: |
          templ generate
          tsgo -p web/ts/tsconfig.json
          tailwindcss -i ./internal/app/webapp/static/input.css -o ./internal/app/webapp/static/output.css --minify
      - run: go test ./... -race -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out
