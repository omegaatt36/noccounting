name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
      tag:
        description: "Image tag (e.g. v1.2.3)"
        required: true

env:
  BOT_IMAGE: omegaatt36/noccounting-bot
  WEB_IMAGE: omegaatt36/noccounting-web

jobs:
  build-binaries:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.ref_name || github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install templ and tsgo
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go install github.com/microsoft/typescript-go/cmd/tsgo@latest

      - name: Install Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

      - name: Generate code (templ + tsgo + tailwind)
        run: |
          templ generate
          tsgo -p web/ts/tsconfig.json
          tailwindcss -i ./internal/app/webapp/static/input.css -o ./internal/app/webapp/static/output.css --minify

      - name: Build bot binary for ${{ matrix.arch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o noccounting-bot-${{ matrix.arch }} ./cmd/bot

      - name: Build webapp binary for ${{ matrix.arch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o noccounting-web-${{ matrix.arch }} ./cmd/webapp

      - name: Upload bot binary
        uses: actions/upload-artifact@v4
        with:
          name: bot-${{ matrix.arch }}
          path: noccounting-bot-${{ matrix.arch }}
          retention-days: 1

      - name: Upload webapp binary
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.arch }}
          path: noccounting-web-${{ matrix.arch }}
          retention-days: 1

  build-and-push-images:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to build context root
        run: |
          mv artifacts/bot-amd64/noccounting-bot-amd64 ./noccounting-bot-amd64
          mv artifacts/bot-arm64/noccounting-bot-arm64 ./noccounting-bot-arm64
          mv artifacts/web-amd64/noccounting-web-amd64 ./noccounting-web-amd64
          mv artifacts/web-arm64/noccounting-web-arm64 ./noccounting-web-arm64
          chmod +x noccounting-*
          ls -l noccounting-*

      - name: Extract metadata for Bot
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BOT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/bot/Dockerfile.buildx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/webapp/Dockerfile.buildx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
