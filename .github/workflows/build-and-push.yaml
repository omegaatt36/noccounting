name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
      tag:
        description: "Image tag (e.g. v1.2.3)"
        required: true

env:
  BOT_IMAGE: omegaatt36/noccounting-bot
  WEB_IMAGE: omegaatt36/noccounting-web

jobs:
  determine-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Determine image tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: determine-tag
    strategy:
      matrix:
        type: [bot, webapp]
        arch: [amd64, arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.ref_name || github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

      - name: Generate code (templ + tsgo + tailwind)
        run: |
          go tool templ generate
          go tool tsgo -p web/ts/tsconfig.json
          tailwindcss -i ./internal/app/webapp/static/input.css -o ./internal/app/webapp/static/output.css --minify

      - name: Build binary for ${{ matrix.type }} on ${{ matrix.arch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          BINARY_NAME: noccounting-${{ matrix.type }}-${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" -o ${BINARY_NAME} ./cmd/${{ matrix.type }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.type }} image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/${{ matrix.type }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: TARGETARCH=${{ matrix.arch }}
          push: true
          tags: ${{ matrix.type == 'bot' && env.BOT_IMAGE || env.WEB_IMAGE }}-linux-${{ matrix.arch }}:${{ needs.determine-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-manifests:
    needs: [determine-tag, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Bot multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.BOT_IMAGE }}:latest \
            --tag ${{ env.BOT_IMAGE }}:${{ needs.determine-tag.outputs.tag }} \
            ${{ env.BOT_IMAGE }}-linux-amd64:${{ needs.determine-tag.outputs.tag }} \
            ${{ env.BOT_IMAGE }}-linux-arm64:${{ needs.determine-tag.outputs.tag }}

      - name: Create Web multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.WEB_IMAGE }}:latest \
            --tag ${{ env.WEB_IMAGE }}:${{ needs.determine-tag.outputs.tag }} \
            ${{ env.WEB_IMAGE }}-linux-amd64:${{ needs.determine-tag.outputs.tag }} \
            ${{ env.WEB_IMAGE }}-linux-arm64:${{ needs.determine-tag.outputs.tag }}
